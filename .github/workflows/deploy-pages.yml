name: Materialize and deploy candidate vision

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize campaign source on main
        shell: bash
        run: |
          if compgen -G 'package-parts/site-source.b64.*' > /dev/null; then
            cat package-parts/site-source.b64.* | base64 --decode > /tmp/site-source.tar.gz
            rm -rf /tmp/materialized
            mkdir -p /tmp/materialized
            tar -xzf /tmp/site-source.tar.gz -C /tmp/materialized
            rsync -a --delete --exclude '.git' --exclude '.github' /tmp/materialized/ ./
            rm -rf package-parts
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m 'Materialize complete 4MP candidate campaign'
              git push origin HEAD:main
            fi
          fi

      - name: Prepare deployable site
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a --exclude '.git' --exclude '.github' --exclude 'package-parts' --exclude '_site' ./ _site/

      - name: Build and verify printable PDFs
        run: |
          python -m pip install --disable-pip-version-check weasyprint pypdf
          mkdir -p _site/docs
          weasyprint _site/resume.html _site/docs/Russell-Dudek-4MP-Resume.pdf
          weasyprint _site/cover-letter.html _site/docs/Russell-Dudek-4MP-Cover-Letter.pdf
          weasyprint _site/interview-brief.html _site/docs/Russell-Dudek-4MP-Interview-Thesis-Brief.pdf
          weasyprint _site/120-day-plan.html _site/docs/Russell-Dudek-4MP-120-Day-Plan.pdf
          weasyprint _site/correction-qualification.html _site/docs/Russell-Dudek-4MP-Correction-Qualification.pdf
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-4MP-Resume.pdf': 2,
              'Russell-Dudek-4MP-Cover-Letter.pdf': 1,
              'Russell-Dudek-4MP-Interview-Thesis-Brief.pdf': 4,
              'Russell-Dudek-4MP-120-Day-Plan.pdf': 3,
              'Russell-Dudek-4MP-Correction-Qualification.pdf': 2,
          }
          for name, pages in expected.items():
              actual = len(PdfReader(Path('_site/docs') / name).pages)
              assert actual == pages, f'{name}: expected {pages}, got {actual}'
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
