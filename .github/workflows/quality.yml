name: Candidate campaign quality

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve candidate source
        shell: bash
        run: |
          rm -rf site
          mkdir -p site
          if compgen -G 'package-parts/site-source.b64.*' > /dev/null; then
            cat package-parts/site-source.b64.* | base64 --decode > /tmp/site-source.tar.gz
            tar -xzf /tmp/site-source.tar.gz -C site
          else
            rsync -a --exclude '.git' --exclude '.github' --exclude 'site' ./ site/
          fi

      - name: Verify required sources
        run: |
          test -f site/index.html
          test -f site/resume.html
          test -f site/cover-letter.html
          test -f site/interview-brief.html
          test -f site/120-day-plan.html
          test -f site/correction-qualification.html
          test -f site/styles.css
          test -f site/app.js
          test -f site/assets/brand/4mp-logo.webp
          test -f site/assets/brand/4mp-autonomous-correction-part.webp

      - name: Verify exact PDF pagination
        run: |
          python -m pip install --disable-pip-version-check weasyprint pypdf
          mkdir -p site/docs
          weasyprint site/resume.html site/docs/Russell-Dudek-4MP-Resume.pdf
          weasyprint site/cover-letter.html site/docs/Russell-Dudek-4MP-Cover-Letter.pdf
          weasyprint site/interview-brief.html site/docs/Russell-Dudek-4MP-Interview-Thesis-Brief.pdf
          weasyprint site/120-day-plan.html site/docs/Russell-Dudek-4MP-120-Day-Plan.pdf
          weasyprint site/correction-qualification.html site/docs/Russell-Dudek-4MP-Correction-Qualification.pdf
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-4MP-Resume.pdf': 2,
              'Russell-Dudek-4MP-Cover-Letter.pdf': 1,
              'Russell-Dudek-4MP-Interview-Thesis-Brief.pdf': 4,
              'Russell-Dudek-4MP-120-Day-Plan.pdf': 3,
              'Russell-Dudek-4MP-Correction-Qualification.pdf': 2,
          }
          for name, pages in expected.items():
              actual = len(PdfReader(Path('site/docs') / name).pages)
              assert actual == pages, f'{name}: expected {pages}, got {actual}'
          PY

      - name: Candidate-facing confidentiality scan
        run: |
          PRIVATE_A='role''forge'
          PRIVATE_B='role'' forge'
          PRIVATE_C='russelldudek/''role''forge'
          ! grep -RniE "$PRIVATE_A|$PRIVATE_B|$PRIVATE_C" site

      - name: Verify direct PDF downloads
        run: |
          grep -q 'download="Russell-Dudek-4MP-Resume.pdf"' site/resume.html
          grep -q 'download="Russell-Dudek-4MP-Cover-Letter.pdf"' site/cover-letter.html
          grep -q 'download="Russell-Dudek-4MP-Interview-Thesis-Brief.pdf"' site/interview-brief.html
          grep -q 'download="Russell-Dudek-4MP-120-Day-Plan.pdf"' site/120-day-plan.html
          grep -q 'download="Russell-Dudek-4MP-Correction-Qualification.pdf"' site/correction-qualification.html
