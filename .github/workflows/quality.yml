name: Candidate campaign quality

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required main-branch sources
        run: |
          test -f index.html
          test -f resume.html
          test -f cover-letter.html
          test -f interview-brief.html
          test -f 120-day-plan.html
          test -f correction-qualification.html
          test -f styles.css
          test -f app.js
          test -f assets/brand/4mp-logo.webp
          test ! -d package-parts

      - name: Build and verify exact PDF pagination
        run: |
          python -m pip install --disable-pip-version-check weasyprint pypdf
          rm -rf docs
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-4MP-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-4MP-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-4MP-Interview-Thesis-Brief.pdf
          weasyprint 120-day-plan.html docs/Russell-Dudek-4MP-120-Day-Plan.pdf
          weasyprint correction-qualification.html docs/Russell-Dudek-4MP-Correction-Qualification.pdf
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-4MP-Resume.pdf': 2,
              'Russell-Dudek-4MP-Cover-Letter.pdf': 1,
              'Russell-Dudek-4MP-Interview-Thesis-Brief.pdf': 4,
              'Russell-Dudek-4MP-120-Day-Plan.pdf': 3,
              'Russell-Dudek-4MP-Correction-Qualification.pdf': 2,
          }
          for name, pages in expected.items():
              actual = len(PdfReader(Path('docs') / name).pages)
              assert actual == pages, f'{name}: expected {pages}, got {actual}'
          PY

      - name: Verify candidate-facing confidentiality
        run: |
          PRIVATE_A='role''forge'
          PRIVATE_B='role'' forge'
          PRIVATE_C='russelldudek/''role''forge'
          ! grep -RniE "$PRIVATE_A|$PRIVATE_B|$PRIVATE_C" -- *.html *.css *.js README.md

      - name: Verify official identity and direct PDF actions
        run: |
          grep -q 'assets/brand/4mp-logo.webp' app.js
          grep -q 'docs/Russell-Dudek-4MP-Resume.pdf' app.js
          grep -q 'docs/Russell-Dudek-4MP-Cover-Letter.pdf' app.js
          grep -q 'docs/Russell-Dudek-4MP-Interview-Thesis-Brief.pdf' app.js
          grep -q 'docs/Russell-Dudek-4MP-120-Day-Plan.pdf' app.js
          grep -q 'docs/Russell-Dudek-4MP-Correction-Qualification.pdf' app.js
