name: Candidate campaign quality

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  campaign-contracts:
    if: ${{ !startsWith(github.event.head_commit.message, 'Stage Precision Workpiece') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PDF reader
        run: pip install pypdf
      - name: Verify readable source and exact application set
        run: |
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          required = [
              'index.html','styles.css','brand-tokens.css','app.js','document.css',
              'resume.html','cover-letter.html','interview-brief.html',
              '120-day-plan.html','correction-qualification.html',
              'brand-intelligence.md','assets/brand/4mp-logo.webp',
              'assets/brand/4mp-autonomous-correction-part.webp'
          ]
          for name in required:
              assert Path(name).exists() and Path(name).stat().st_size > 0, name
          expected = {
              'Russell-Dudek-4MP-Resume.pdf': 2,
              'Russell-Dudek-4MP-Cover-Letter.pdf': 1,
              'Russell-Dudek-4MP-Interview-Thesis-Brief.pdf': 4,
              'Russell-Dudek-4MP-120-Day-Plan.pdf': 3,
              'Russell-Dudek-4MP-Correction-Qualification.pdf': 2,
          }
          for name, count in expected.items():
              path = Path('docs') / name
              assert path.exists(), path
              assert len(PdfReader(path).pages) == count, name
          html = Path('index.html').read_text()
          for scenario in ('thermal','wear','fixture','program'):
              assert f'data-scenario="{scenario}"' in html
          assert 'dossier-downloads' not in html
          assert not Path('source-parts').exists()
          assert not Path('binary-parts').exists()
          PY
      - name: Candidate-facing confidentiality scan
        run: |
          PRIVATE_A='role''forge'
          PRIVATE_B='russelldudek/'"$PRIVATE_A"
          PRIVATE_C='public'' repository'
          PRIVATE_D='source'' repository'
          ! grep -RniE "$PRIVATE_A|$PRIVATE_B|$PRIVATE_C|$PRIVATE_D" --exclude-dir=.git .
