name: Materialize redesigned candidate campaign

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Reconstruct readable source
        shell: bash
        run: |
          set -euo pipefail
          cat materialize/source.b64.* | base64 --decode > /tmp/source.tar.gz
          echo 'bc108bfd765692c1bc086d18105a3c5224fd80800a11ac9cdc2369211c65b3a9  /tmp/source.tar.gz' | sha256sum -c -
          mkdir -p /tmp/source
          tar -xzf /tmp/source.tar.gz -C /tmp/source
          git rm -r --ignore-unmatch '*.html' '*.css' '*.js' '*.md' tests docs materialize assets/brand
          cp -R /tmp/source/. .
          mkdir -p assets/brand docs
          touch .nojekyll
      - name: Install renderer
        run: |
          python -m pip install --upgrade pip
          pip install playwright pillow pypdf
          playwright install --with-deps chromium
      - name: Acquire official 4MP assets
        shell: bash
        run: |
          set -euo pipefail
          curl -L 'https://framerusercontent.com/images/C0GJhbSUAQ4rnknALYf5gdDClgA.png?height=32&width=116' -o /tmp/logo.png
          curl -L 'https://framerusercontent.com/images/BTA9rzuJV1vMhdDnDRd34xN2cNs.png?height=720&scale-down-to=512&width=1002' -o /tmp/product.png
          python - <<'PY'
          from PIL import Image
          from pathlib import Path
          out=Path('assets/brand'); out.mkdir(parents=True,exist_ok=True)
          Image.open('/tmp/logo.png').convert('RGBA').save(out/'4mp-logo.webp','WEBP',quality=94,method=6)
          Image.open('/tmp/product.png').convert('RGB').save(out/'4mp-autonomous-correction-part.webp','WEBP',quality=91,method=6)
          PY
      - name: Generate exact PDFs
        shell: bash
        run: |
          python - <<'PY'
          from playwright.sync_api import sync_playwright
          from pathlib import Path
          import base64,mimetypes
          root=Path.cwd()
          def data_uri(path):
              p=root/path; mime=mimetypes.guess_type(p.name)[0] or 'application/octet-stream'
              return f'data:{mime};base64,'+base64.b64encode(p.read_bytes()).decode()
          def inline_html(name):
              html=(root/name).read_text()
              for css in ['document.css','document-print.css']:
                  html=html.replace(f'<link rel="stylesheet" href="{css}">',f'<style>{(root/css).read_text()}</style>')
              return html.replace('assets/brand/4mp-logo.webp',data_uri('assets/brand/4mp-logo.webp'))
          outputs={
           'resume.html':'Russell-Dudek-4MP-Resume.pdf',
           'cover-letter.html':'Russell-Dudek-4MP-Cover-Letter.pdf',
           'interview-brief.html':'Russell-Dudek-4MP-Interview-Thesis-Brief.pdf',
           '120-day-plan.html':'Russell-Dudek-4MP-120-Day-Plan.pdf',
           'correction-qualification.html':'Russell-Dudek-4MP-Correction-Qualification.pdf'}
          Path('docs').mkdir(exist_ok=True)
          with sync_playwright() as p:
              browser=p.chromium.launch(headless=True)
              for html,pdf in outputs.items():
                  page=browser.new_page()
                  page.set_content(inline_html(html),wait_until='load')
                  page.emulate_media(media='print')
                  page.pdf(path=str(root/'docs'/pdf),print_background=True,prefer_css_page_size=True,margin={'top':'0','right':'0','bottom':'0','left':'0'})
                  page.close()
              browser.close()
          PY
      - name: Validate source and PDFs
        shell: bash
        run: |
          set -euo pipefail
          node --check app.js
          node tests/campaign-contract.test.mjs
          python - <<'PY'
          from pypdf import PdfReader
          from pathlib import Path
          expected={
           'Russell-Dudek-4MP-Resume.pdf':2,
           'Russell-Dudek-4MP-Cover-Letter.pdf':1,
           'Russell-Dudek-4MP-Interview-Thesis-Brief.pdf':3,
           'Russell-Dudek-4MP-120-Day-Plan.pdf':2,
           'Russell-Dudek-4MP-Correction-Qualification.pdf':2}
          for name,pages in expected.items():
              actual=len(PdfReader(Path('docs')/name).pages)
              assert actual==pages,(name,actual,pages)
          PY
          ! grep -RinE '\bmandate\b|roleforge' --include='*.html' --include='*.css' --include='app.js' --include='README.md' .
      - name: Commit final readable campaign
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/materialize-redesign.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Rebuild the 4MP candidate campaign' || exit 0
          git push origin HEAD:${GITHUB_HEAD_REF:-xora-2026-rebuild}
