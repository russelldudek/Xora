name: Materialize candidate campaign

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - id: staging
        name: Detect staged campaign
        shell: bash
        run: |
          if compgen -G 'source-parts/site-source.tar.gz.b64.*' > /dev/null && compgen -G 'binary-parts/product.webp.b64.*' > /dev/null; then
            echo 'ready=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ready=false' >> "$GITHUB_OUTPUT"
          fi
      - if: steps.staging.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - if: steps.staging.outputs.ready == 'true'
        name: Assemble readable campaign source
        run: |
          cat source-parts/site-source.tar.gz.b64.* | base64 --decode > /tmp/site-source.tar.gz
          tar -xzf /tmp/site-source.tar.gz
          for target in index.html styles.css app.js document.css resume.html cover-letter.html interview-brief.html 120-day-plan.html correction-qualification.html; do
            test -s "${target}"
          done
      - if: steps.staging.outputs.ready == 'true'
        name: Restore official product asset
        run: |
          mkdir -p assets/brand
          cat binary-parts/product.webp.b64.* | base64 --decode > assets/brand/4mp-autonomous-correction-part.webp
          test -s assets/brand/4mp-autonomous-correction-part.webp
      - if: steps.staging.outputs.ready == 'true'
        name: Install PDF renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium || sudo apt-get install -y chromium-browser
          pip install playwright pypdf
      - if: steps.staging.outputs.ready == 'true'
        name: Generate and verify exact PDFs
        run: |
          python scripts/generate_pdfs.py
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-4MP-Resume.pdf': 2,
              'Russell-Dudek-4MP-Cover-Letter.pdf': 1,
              'Russell-Dudek-4MP-Interview-Thesis-Brief.pdf': 4,
              'Russell-Dudek-4MP-120-Day-Plan.pdf': 3,
              'Russell-Dudek-4MP-Correction-Qualification.pdf': 2,
          }
          for name, count in expected.items():
              path = Path('docs') / name
              assert path.exists() and path.stat().st_size > 0, path
              assert len(PdfReader(path).pages) == count, f'{name}: expected {count}'
          PY
      - if: steps.staging.outputs.ready == 'true'
        name: Commit complete readable campaign to the PR branch
        run: |
          rm -rf source-parts binary-parts
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete Precision Workpiece campaign'
          git push origin "HEAD:${{ github.head_ref }}"
